<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediTrack - Doctor Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dashboard-body">

    <header class="mobile-header">
        <div class="logo">
            <i class="fa-solid fa-notes-medical"></i>
            <h1>MediTrack</h1>
        </div>
        <button id="mobile-menu-btn" class="hamburger-btn" aria-label="Toggle menu">
            <i class="fa-solid fa-bars"></i>
        </button>
    </header>

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header desktop-only">
                <div class="logo">
                    <i class="fa-solid fa-notes-medical"></i>
                    <h2>MediTrack</h2>
                </div>
            </div>
            
            <div class="user-profile-widget">
                <img src="https://ui-avatars.com/api/?name=Dr+Emily&background=A0D4E0&color=fff" alt="Doctor Avatar" class="avatar">
                <div class="user-info">
                    <span class="user-name">Dr. Emily Chen</span>
                    <span class="user-role">Pediatrics</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <ul class="nav-list">
                    <li><a href="#" class="nav-item active"><i class="fa-solid fa-calendar-check"></i> Appointments</a></li>
                    <li><a href="#" class="nav-item"><i class="fa-solid fa-bed-pulse"></i> Inpatients</a></li>
                    <li><a href="#" class="nav-item"><i class="fa-solid fa-file-prescription"></i> Prescriptions</a></li>
                    <li><a href="#" class="nav-item"><i class="fa-solid fa-user-doctor"></i> My Profile</a></li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <a href="index.html" class="nav-item logout"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="section-header">
                <h2>Doctor Dashboard</h2>
                <div class="availability-toggle">
                    <span id="availability-status">Available</span>
                    <label class="switch">
                        <input type="checkbox" id="availability-checkbox" checked>
                        <span class="slider round"></span>
                    </label>
                </div>
            </header>
            
            <div class="dashboard-grid doctor-grid">
                <!-- Appointments List -->
                <article class="card today-appointments">
                    <h3><i class="fa-solid fa-calendar-check"></i> Today's Appointments</h3>
                    <ul id="appointments-list" class="appointment-list">
                        <li class="loading-state text-center">Loading appointments...</li>
                    </ul>
                </article>

                <!-- Digital Prescription Tool -->
                <article class="card digital-prescription">
                    <h3><i class="fa-solid fa-file-prescription"></i> Digital Prescription Tool</h3>
                    <form id="prescription-form" class="dynamic-form">
                        <div class="form-group">
                            <label for="patient-search">Patient Name</label>
                            <input type="text" id="patient-search" placeholder="Search patient..." required>
                        </div>
                        <div class="form-group">
                            <label for="medication">Medication & Dosage</label>
                            <textarea id="medication" rows="4" placeholder="e.g. Amoxicillin 500mg, 1 tablet twice a day..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Issue Prescription</button>
                    </form>
                </article>
            </div>
        </main>
    </div>

    <!-- Modal for Patient Medical History -->
    <div id="medical-history-modal" class="modal" aria-hidden="true" role="dialog" aria-labelledby="modal-title">
        <div class="modal-content">
            <header class="modal-header">
                <h3 id="modal-title">Patient Medical History</h3>
                <button class="close-modal" aria-label="Close modal">&times;</button>
            </header>
            <div class="modal-body" id="modal-history-content">
                <p class="loading-state">Retrieving records...</p>
            </div>
        </div>
    </div>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <script src="js/app.js"></script>
</body>
</html>
